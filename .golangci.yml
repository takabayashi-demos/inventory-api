run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gocritic
    - gosec

linters-settings:
  govet:
    shadow: true
  gocritic:
    enabled-checks:
      - appendAssign
      - dupBranchBody
      - dupCase
      - dupSubExpr
  gosec:
    excludes:
      - G104

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
